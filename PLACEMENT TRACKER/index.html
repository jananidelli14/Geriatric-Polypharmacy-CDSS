<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Prep Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🎯 Placement Prep Tracker</h1>
      <p>Build consistency, land your dream job</p>
    </header>

    <!-- Level Progress Bar -->
    <div class="level-card">
      <div class="level-header">
        <div class="level-info">
          <span class="level-badge">Level <span id="userLevel">1</span></span>
          <span class="level-title" id="levelTitle">Beginner</span>
        </div>
        <div class="xp-text"><span id="currentXP">0</span> / <span id="nextLevelXP">100</span> XP</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="xpProgress" style="width: 0%"></div>
      </div>
      <div class="level-rewards">
        <span class="reward-badge">🎖️</span>
        <span class="reward-badge">🏅</span>
        <span class="reward-badge locked">🏆</span>
        <span class="reward-badge locked">👑</span>
        <span class="reward-badge locked">💎</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-label">Current Streak</div>
        <div class="stat-value" id="currentStreak">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏆</div>
        <div class="stat-label">Longest Streak</div>
        <div class="stat-value" id="longestStreak">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-label">This Week</div>
        <div class="stat-value"><span id="weekHours">0</span>h</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏱️</div>
        <div class="stat-label">Total Hours</div>
        <div class="stat-value" id="totalHours">0</div>
      </div>
    </div>

    <div class="main-content">
      <div class="card">
        <h2>Today's Study Session</h2>
        
        <div class="checkbox-group">
          <div class="checkbox-item">
            <input type="checkbox" id="aptitude">
            <label for="aptitude">💡 Aptitude</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="coding">
            <label for="coding">💻 Coding Practice</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="core">
            <label for="core">📖 Core Subjects</label>
          </div>
          <div class="checkbox-item">
            <input type="checkbox" id="revision">
            <label for="revision">🔄 Revision</label>
          </div>
        </div>

        <div class="input-group">
          <label>Minutes Studied</label>
          <input type="number" id="minutes" min="0" placeholder="e.g., 120">
        </div>

        <div class="input-group">
          <label>What did you accomplish today?</label>
          <textarea id="notes" placeholder="Solved 5 coding problems, revised OS concepts..."></textarea>
        </div>

        <button class="btn" id="saveBtn">Save Today's Progress</button>
      </div>

      <div class="card">
        <h2>Recent Activity</h2>
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- Celebration Modal -->
  <div id="celebrationModal" class="modal">
    <div class="modal-content">
      <div class="celebration-emoji">🎉</div>
      <h2 id="celebrationTitle">Level Up!</h2>
      <p id="celebrationText">You've reached Level 2!</p>
      <button class="btn" onclick="closeCelebration()">Awesome!</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
